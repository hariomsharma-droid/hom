<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hexagon - My Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #12151b;
    --panel: #1a1f27;
    --panel-2: #212733;
    --border: #2a3140;
    --text: #e9ecf1;
    --text-dim: #8d96a5;
    --teal: #3ecf8e;
    --amber: #f2b84b;
    --coral: #ff6b6b;
    --violet: #9b8cff;
    --sky: #5ec8ef;
    --gold: #e0b84a;
  }
  body[data-theme="light"]{
    --bg: #f4f5f7;
    --panel: #ffffff;
    --panel-2: #eef0f3;
    --border: #dbdfe6;
    --text: #1b1f27;
    --text-dim: #6b7280;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Roboto', sans-serif;
    min-height:100vh;
    transition:background .15s, color .15s;
  }
  .topbar{
    position:relative;
    padding:22px 24px 18px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
    overflow:hidden;
  }
  .logo-mark{
    height:31px;
    width:auto;
    flex-shrink:0;
    background:#ffffff;
    padding:4px 8px;
    border-radius:6px;
    border:1px solid var(--border);
  }
  .title-block{display:flex; align-items:center; gap:12px;}
  h1{
    font-size:18px; margin:0; font-weight:600; letter-spacing:0.2px;
  }
  .subtitle{color:var(--text-dim); font-size:12.5px; margin-top:2px;}
  .controls{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  input, textarea, select{
    font-family:inherit;
    background:var(--panel-2);
    border:1px solid var(--border);
    color:var(--text);
    border-radius:7px;
    padding:8px 10px;
    font-size:13px;
    outline:none;
  }
  input:focus, textarea:focus, select:focus{ border-color:var(--teal); }
  button{
    font-family:inherit;
    cursor:pointer;
    border-radius:7px;
    border:1px solid var(--border);
    background:var(--panel-2);
    color:var(--text);
    padding:8px 12px;
    font-size:13px;
    transition:background .15s, border-color .15s;
  }
  button:hover{ border-color:var(--teal); }
  .btn-primary{ background:var(--teal); color:#0b1310; border-color:var(--teal); font-weight:600; }
  .btn-primary:hover{ filter:brightness(1.05); }
  .search-input{ width:220px; }
  #board{
    display:flex;
    gap:16px;
    padding:20px 24px;
    overflow-x:auto;
    align-items:flex-start;
  }
  .column{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    width:290px;
    flex:0 0 290px;
    display:flex;
    flex-direction:column;
    max-height:calc(100vh - 110px);
  }
  .col-head{
    padding:14px 14px 10px;
    border-bottom:1px solid var(--border);
    border-top:3px solid var(--accent, var(--teal));
    border-radius:12px 12px 0 0;
  }
  .col-head-top{ display:flex; justify-content:space-between; align-items:center; gap:8px;}
  .col-name{ font-weight:600; font-size:14px; }
  .col-remove{
    background:transparent; border:none; color:var(--text-dim); font-size:15px; padding:2px 4px;
  }
  .col-remove:hover{ color:var(--coral); border:none; }
  .col-stats{ color:var(--text-dim); font-size:11.5px; margin-top:4px; font-family:'Roboto', sans-serif; }
  .progress{
    height:4px; background:var(--panel-2); border-radius:2px; margin-top:8px; overflow:hidden;
  }
  .progress-fill{ height:100%; background:var(--accent, var(--teal)); border-radius:2px; }
  .cards{
    padding:10px 10px 4px;
    overflow-y:auto;
    flex:1;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .card{
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:9px;
    padding:10px 10px 8px;
    font-size:13px;
  }
  .card.done{ opacity:0.55; }
  .card.hidden{ display:none; }
  .card{ cursor:grab; }
  .card:active{ cursor:grabbing; }
  .cards.drag-over{
    background:rgba(62,207,142,0.06);
    outline:2px dashed var(--accent, var(--teal));
    outline-offset:-4px;
    border-radius:8px;
  }
  .card.drag-over-top{ border-top:2px solid var(--accent, var(--teal)); }
  .card.drag-over-bottom{ border-bottom:2px solid var(--accent, var(--teal)); }
  .col-name{ font-weight:600; font-size:14px; cursor:text; }
  .col-name-input{
    font-family:inherit; font-weight:600; font-size:14px;
    width:100%; padding:3px 6px;
  }
  .card-top{ display:flex; align-items:flex-start; gap:8px; }
  .card-check{ margin-top:2px; accent-color:var(--teal); cursor:pointer; flex-shrink:0; }
  .card-text{
    flex:1; line-height:1.4; word-break:break-word; cursor:text;
  }
  .card-text.done-text{ text-decoration:line-through; color:var(--text-dim); }
  .card-actions{ display:flex; gap:4px; flex-shrink:0; }
  .icon-btn{
    background:transparent; border:none; padding:2px 4px; font-size:12px; color:var(--text-dim);
  }
  .icon-btn:hover{ color:var(--sky); border:none; }
  .icon-btn.del:hover{ color:var(--coral); }
  .tat-row{ display:flex; align-items:center; gap:6px; margin-top:7px; }
  .tat-badge{
    font-family:'Roboto', sans-serif;
    font-size:10.5px;
    padding:2px 7px;
    border-radius:20px;
    border:1px solid var(--border);
    color:var(--text-dim);
    cursor:text;
  }
  .tat-badge.done{ color:var(--teal); border-color:rgba(62,207,142,0.4); }
  .tat-badge.blocked{ color:var(--coral); border-color:rgba(255,107,107,0.4); position:relative; }
  .tat-badge.pending{ color:var(--amber); border-color:rgba(242,184,75,0.4); }
  .blip{
    width:6px; height:6px; border-radius:50%; background:var(--coral); flex-shrink:0;
    animation:pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.25;} }
  .edit-field{
    width:100%; resize:vertical; min-height:44px; font-size:13px; margin-bottom:6px;
  }
  .edit-tat{ width:120px; font-size:12px; }
  .edit-row{ display:flex; gap:6px; align-items:center; }
  .add-form{
    padding:10px; border-top:1px solid var(--border);
  }
  .add-form input{ width:100%; margin-bottom:6px; }
  .add-form-row{ display:flex; gap:6px; }
  .add-form-row input:first-child{ flex:1.3; }
  .add-form-row input:last-child{ flex:1; }
  .add-form button{ width:100%; margin-top:6px; }
  .new-col{
    flex:0 0 220px;
    border:1px dashed var(--border);
    border-radius:12px;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:16px;
  }
  .new-col-form{ width:100%; display:flex; flex-direction:column; gap:8px; }
  .empty-msg{ color:var(--text-dim); font-size:12px; text-align:center; padding:14px 4px; }
  ::-webkit-scrollbar{ height:8px; width:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--border); border-radius:4px; }
  @media (max-width:640px){
    .topbar{ flex-direction:column; align-items:flex-start; }
    .search-input{ width:100%; }
  }
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    align-items:center; justify-content:center;
    z-index:100;
    padding:20px;
  }
  .modal-overlay.open{ display:flex; }
  .modal-box{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    width:100%;
    max-width:680px;
    max-height:80vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .modal-head{
    padding:16px 20px;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
    gap:10px;
  }
  .modal-title{ font-weight:600; font-size:15px; }
  .modal-subtitle{ color:var(--text-dim); font-size:12px; margin-top:2px; }
  .modal-close{
    background:transparent; border:none; font-size:16px; color:var(--text-dim); padding:4px 8px;
  }
  .modal-close:hover{ color:var(--coral); border:none; }
  .modal-body{
    padding:0 20px 20px;
    overflow-y:auto;
  }
  .due-table{
    width:100%;
    border-collapse:collapse;
    margin-top:14px;
    font-size:13px;
  }
  .due-table th{
    text-align:left;
    color:var(--text-dim);
    font-weight:600;
    font-size:11.5px;
    text-transform:uppercase;
    letter-spacing:0.4px;
    padding:8px 10px;
    border-bottom:1px solid var(--border);
  }
  .due-table td{
    padding:9px 10px;
    border-bottom:1px solid var(--border);
    vertical-align:top;
  }
  .due-table tr:last-child td{ border-bottom:none; }
  .due-person-tag{
    display:inline-block;
    font-size:11px;
    padding:2px 8px;
    border-radius:20px;
    border:1px solid var(--border);
    color:var(--text-dim);
    white-space:nowrap;
  }
  .due-empty{
    color:var(--text-dim);
    font-size:13px;
    text-align:center;
    padding:30px 10px;
  }
</style>
</head>

const STORAGE_KEY = 'ops-dashboard-v1';
const THEME_KEY = 'ops-dashboard-theme-v1';
const hasClaudeStorage = (typeof window.storage !== 'undefined') && window.storage && typeof window.storage.get === 'function';

async function storageGet(key){
  if(hasClaudeStorage){
    try{ return await window.storage.get(key); }catch(e){ return null; }
  }
  try{
    const v = localStorage.getItem(key);
    return v !== null ? { key, value: v } : null;
  }catch(e){ return null; }
}

async function storageSet(key, value){
  if(hasClaudeStorage){
    try{ return await window.storage.set(key, value); }catch(e){ console.error('Storage set failed', e); return null; }
  }
  try{
    localStorage.setItem(key, value);
    return { key, value };
  }catch(e){ console.error('Storage set failed', e); return null; }
}

async function loadTheme(){
  try{
    const r = await storageGet(THEME_KEY);
    theme = r ? r.value : 'dark';
  }catch(e){
    theme = 'dark';
  }
  applyTheme();
}

function applyTheme(){
  document.body.setAttribute('data-theme', theme);
  const btn = document.getElementById('themeToggle');
  if(btn) btn.textContent = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
}

async function toggleTheme(){
  theme = theme === 'dark' ? 'light' : 'dark';
  applyTheme();
  try{ await storageSet(THEME_KEY, theme); }catch(e){ console.error('Theme save failed', e); }
}

async function loadState(){
  try{
    const r = await storageGet(STORAGE_KEY);
    state = r ? JSON.parse(r.value) : seedState();
    if(!r) await saveState();
  }catch(e){
    state = seedState();
    await saveState();
  }
  renderBoard();
}

async function saveState(){
  try{
    await storageSet(STORAGE_KEY, JSON.stringify(state));
  }catch(e){ console.error('Save failed', e); }
  updateStatusLine();
}

function updateStatusLine(){
  const total = state.tasks.length;
  const done = state.tasks.filter(t=>t.done).length;
  document.getElementById('statusLine').textContent =
    `${state.persons.length} lists · ${done}/${total} tasks done · saved`;
}

function colorFor(personIndex){
  return COLORS[personIndex % COLORS.length];
}

function tatClass(task){
  if(task.done) return 'done';
  if(/\?\?/.test(task.tat)) return 'blocked';
  if(task.tat) return 'pending';
  return 'pending';
}

function toggleNewColumn(v){
  showNewCol = v;
  renderBoard();
  if(v){ setTimeout(()=>{ const el=document.getElementById('newColInput'); if(el) el.focus(); },0); }
}

function addPerson(){
  const input = document.getElementById('newColInput');
  const name = input.value.trim();
  if(!name) return;
  if(state.persons.includes(name)){ alert('That list already exists.'); return; }
  state.persons.push(name);
  showNewCol = false;
  saveState();
  renderBoard();
}

function removePerson(person){
  const hasTasks = state.tasks.some(t=>t.person===person);
  if(hasTasks && !confirm(`Remove "${person}" and all its tasks?`)) return;
  state.persons = state.persons.filter(p=>p!==person);
  state.tasks = state.tasks.filter(t=>t.person!==person);
  saveState();
  renderBoard();
}

  if(newName && newName !== oldName){
    if(state.persons.includes(newName)){
      alert('A list with that name already exists.');
    } else {
      const idx = state.persons.indexOf(oldName);
      if(idx !== -1) state.persons[idx] = newName;
      state.tasks.forEach(t => { if(t.person === oldName) t.person = newName; });
    }
  }
  renamingPerson = null;
  saveState();
  renderBoard();
}

function addTask(person){
  const textInput = document.getElementById('add-text-'+cssId(person));
  const tatInput = document.getElementById('add-tat-'+cssId(person));
  const text = textInput.value.trim();
  if(!text) return;
  state.tasks.push({ id: uid(), person, text, tat: tatInput.value.trim(), done:false });
  textInput.value=''; tatInput.value='';
  saveState();
  renderBoard();
}

function toggleDone(id){
  const t = state.tasks.find(t=>t.id===id);
  if(t){ t.done = !t.done; saveState(); renderBoard(); }
}

function deleteTask(id){
  state.tasks = state.tasks.filter(t=>t.id!==id);
  saveState();
  renderBoard();
}

function startEdit(id){
  const card = document.querySelector(`[data-card-id="${id}"]`);
  if(card) card.classList.add('editing');
  renderBoard(id);
}

function saveEdit(id){
  const t = state.tasks.find(t=>t.id===id);
  const textEl = document.getElementById('edit-text-'+id);
  const tatEl = document.getElementById('edit-tat-'+id);
  if(t && textEl){
    t.text = textEl.value.trim() || t.text;
    t.tat = tatEl.value.trim();
    t.done = /done/i.test(t.tat) ? t.done || false : t.done;
  }
  editingId = null;
  saveState();
  renderBoard();
}

function cancelEdit(){
  editingId = null;
  renderBoard();
}

function cssId(str){ return str.replace(/[^a-z0-9]/gi,'_'); }

const MONTH_MAP = {
  jan:0, january:0, feb:1, february:1, mar:2, march:2, apr:3, april:3,
  may:4, jun:5, june:5, jul:6, july:6, aug:7, august:7,
  sep:8, sept:8, september:8, oct:9, october:9, nov:10, november:10, dec:11, december:11
};

function sameDay(a, b){
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

function parseTatToDate(tatStr){
  if(!tatStr) return null;
  const str = tatStr.trim();
  const lower = str.toLowerCase();
  const now = new Date();

  if(/\btoday\b/.test(lower)) return now;
  if(/\btomorrow\b/.test(lower)){
    const d = new Date(now);
    d.setDate(d.getDate()+1);
    return d;
  }

  // e.g. "30-Jun-26", "29 June 26", "1 July 26"
  let m = str.match(/(\d{1,2})[\s\-]+([A-Za-z]{3,9})[\s\-]+(\d{2,4})/);
  if(m && MONTH_MAP[m[2].toLowerCase()] !== undefined){
    const day = parseInt(m[1], 10);
    let year = parseInt(m[3], 10);
    if(year < 100) year += 2000;
    return new Date(year, MONTH_MAP[m[2].toLowerCase()], day);
  }

  // e.g. "Monday 6 July" (no year -> assume current year)
  m = str.match(/(\d{1,2})[\s\-]+([A-Za-z]{3,9})\b/);
  if(m && MONTH_MAP[m[2].toLowerCase()] !== undefined){
    const day = parseInt(m[1], 10);
    return new Date(now.getFullYear(), MONTH_MAP[m[2].toLowerCase()], day);
  }

  return null;
}

function getDueTodayTasks(){
  const now = new Date();
  return state.tasks.filter(t=>{
    if(t.done) return false;
    const d = parseTatToDate(t.tat);
    return d && sameDay(d, now);
  });
}

function showDueToday(){
  const items = getDueTodayTasks();
  const table = document.getElementById('dueTable');
  const tbody = document.getElementById('dueTableBody');
  const emptyMsg = document.getElementById('dueEmptyMsg');
  const subtitle = document.getElementById('dueSubtitle');

  const today = new Date();
  subtitle.textContent = today.toLocaleDateString(undefined, { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  tbody.innerHTML = '';
  if(items.length === 0){
    table.style.display = 'none';
    emptyMsg.style.display = 'block';
  } else {
    table.style.display = 'table';
    emptyMsg.style.display = 'none';
    items.forEach(t=>{
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><span class="due-person-tag">${escapeHtml(t.person)}</span></td>
        <td>${escapeHtml(t.text)}</td>
        <td>${escapeHtml(t.tat || '—')}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  document.getElementById('dueModal').classList.add('open');
}

function closeDueModal(){
  document.getElementById('dueModal').classList.remove('open');
}

document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape') closeDueModal();
});

function onDragStart(e, id){
  e.dataTransfer.setData('text/plain', id);
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}
function onDrop(e, person){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const id = e.dataTransfer.getData('text/plain');
  const idx = state.tasks.findIndex(t=>t.id===id);
  if(idx===-1) return;
  const t = state.tasks[idx];
  state.tasks.splice(idx,1);
  t.person = person;
  state.tasks.push(t);
  saveState();
  renderBoard();
}

function onCardDragOver(e){
  e.preventDefault();
  e.stopPropagation();
  e.dataTransfer.dropEffect = 'move';
  const rect = e.currentTarget.getBoundingClientRect();
  const before = (e.clientY - rect.top) < rect.height/2;
  e.currentTarget.classList.remove('drag-over-top','drag-over-bottom');
  e.currentTarget.classList.add(before ? 'drag-over-top' : 'drag-over-bottom');
}
function onCardDragLeave(e){
  e.stopPropagation();
  e.currentTarget.classList.remove('drag-over-top','drag-over-bottom');
}
function onCardDrop(e, targetId, person){
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.classList.remove('drag-over-top','drag-over-bottom');
  const draggedId = e.dataTransfer.getData('text/plain');
  if(!draggedId || draggedId === targetId) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const before = (e.clientY - rect.top) < rect.height/2;
  moveTask(draggedId, person, targetId, before);
}

function moveTask(draggedId, targetPerson, targetId, before){
  const draggedIdx = state.tasks.findIndex(t=>t.id===draggedId);
  if(draggedIdx===-1) return;
  const dragged = state.tasks[draggedIdx];
  state.tasks.splice(draggedIdx,1);
  dragged.person = targetPerson;
  const targetIdx = state.tasks.findIndex(t=>t.id===targetId);
  if(targetIdx===-1){
    state.tasks.push(dragged);
  } else {
    const insertAt = before ? targetIdx : targetIdx+1;
    state.tasks.splice(insertAt,0,dragged);
  }
  saveState();
  renderBoard();
}

let editingId = null;
let renamingPerson = null;

function renderBoard(forceEditId){
  if(forceEditId !== undefined && typeof forceEditId === 'string'){ editingId = forceEditId; }
  const board = document.getElementById('board');
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  board.innerHTML = '';

  state.persons.forEach((person, idx) => {
    const accent = colorFor(idx);
    const col = document.createElement('div');
    col.className = 'column';
    col.style.setProperty('--accent', `var(${accent})`);

    const tasks = state.tasks.filter(t=>t.person===person);
    const notDone = tasks.filter(t=>!t.done);
    const doneTasks = tasks.filter(t=>t.done);
    const orderedTasks = [...notDone, ...doneTasks];
    const doneCount = doneTasks.length;
    const pct = tasks.length ? Math.round((doneCount/tasks.length)*100) : 0;

    col.innerHTML = `
      <div class="col-head">
        <div class="col-head-top">
          ${renamingPerson === person
            ? `<input type="text" class="col-name-input" id="rename-input-${cssId(person)}" value="${escapeAttr(person)}"
                 onkeydown="if(event.key==='Enter'){this.blur();} if(event.key==='Escape'){renamingPerson=null; renderBoard();}"
                 onblur="saveRenamePerson('${escapeAttr(person)}')">`
            : `<div class="col-name" ondblclick="startRenamePerson('${escapeAttr(person)}')" title="Double-click to rename">${escapeHtml(person)}</div>`
          }
          <button class="col-remove" onclick="removePerson('${escapeAttr(person)}')" title="Remove list">✕</button>
        </div>
        <div class="col-stats">${doneCount}/${tasks.length} done</div>
        <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="cards" id="cards-${cssId(person)}"
           ondragover="onDragOver(event)"
           ondragleave="onDragLeave(event)"
           ondrop="onDrop(event,'${escapeAttr(person)}')"></div>
      <div class="add-form">
        <div class="add-form-row">
          <input type="text" id="add-text-${cssId(person)}" placeholder="New task…" onkeydown="if(event.key==='Enter'){document.getElementById('add-tat-${cssId(person)}').focus()}">
          <input type="text" id="add-tat-${cssId(person)}" placeholder="TAT / date" onkeydown="if(event.key==='Enter'){addTask('${escapeAttr(person)}')}">
        </div>
        <button onclick="addTask('${escapeAttr(person)}')">+ Add task</button>
      </div>
    `;
    board.appendChild(col);

    const cardsEl = col.querySelector(`#cards-${cssId(person)}`);
    if(orderedTasks.length===0){
      cardsEl.innerHTML = `<div class="empty-msg">No tasks yet.</div>`;
    }
    orderedTasks.forEach(t => {
      const matches = !query || t.text.toLowerCase().includes(query) || t.tat.toLowerCase().includes(query);
      const card = document.createElement('div');
      card.className = 'card' + (t.done ? ' done' : '') + (matches ? '' : ' hidden');
      card.setAttribute('data-card-id', t.id);
      if(editingId !== t.id){
        card.setAttribute('draggable', 'true');
        card.addEventListener('dragstart', (e)=>onDragStart(e, t.id));
        card.addEventListener('dragover', (e)=>onCardDragOver(e));
        card.addEventListener('dragleave', (e)=>onCardDragLeave(e));
        card.addEventListener('drop', (e)=>onCardDrop(e, t.id, person));
      }

      if(editingId === t.id){
        card.innerHTML = `
          <textarea class="edit-field" id="edit-text-${t.id}">${escapeHtml(t.text)}</textarea>
          <div class="edit-row">
            <input class="edit-tat" id="edit-tat-${t.id}" value="${escapeAttr(t.tat)}" placeholder="TAT / date">
            <button class="btn-primary" onclick="saveEdit('${t.id}')">Save</button>
            <button onclick="cancelEdit()">Cancel</button>
          </div>
        `;
      } else {
        const tc = tatClass(t);
        card.innerHTML = `
          <div class="card-top">
            <input type="checkbox" class="card-check" ${t.done?'checked':''} onchange="toggleDone('${t.id}')">
            <div class="card-text ${t.done?'done-text':''}" ondblclick="startEdit('${t.id}')">${escapeHtml(t.text)}</div>
            <div class="card-actions">
              <button class="icon-btn" onclick="startEdit('${t.id}')" title="Edit">✎</button>
              <button class="icon-btn del" onclick="deleteTask('${t.id}')" title="Delete">🗑</button>
            </div>
          </div>
          <div class="tat-row">
            ${tc==='blocked' ? '<span class="blip"></span>' : ''}
            <span class="tat-badge ${tc}" ondblclick="startEdit('${t.id}')">${escapeHtml(t.tat || 'no date')}</span>
          </div>
        `;
      }
      cardsEl.appendChild(card);
    });
  });

  if(showNewCol){
    const nc = document.createElement('div');
    nc.className = 'new-col';
    nc.innerHTML = `
      <div class="new-col-form">
        <input type="text" id="newColInput" placeholder="Person or project name" onkeydown="if(event.key==='Enter'){addPerson()}">
        <button class="btn-primary" onclick="addPerson()">Create list</button>
        <button onclick="toggleNewColumn(false)">Cancel</button>
      </div>
    `;
    board.appendChild(nc);
  }

  updateStatusLine();
}

function escapeHtml(str){
  return (str||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str){ return escapeHtml(str); }

loadTheme();
loadState();
</script>
